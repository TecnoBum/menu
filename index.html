<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;500;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #1a1a1a;
            --primary-light: #333333;
            --secondary: #c9a227;
            --bg: #ffffff;
            --surface: #f8f8f8;
            --surface-hover: #f0f0f0;
            --text: #1a1a1a;
            --text-muted: #666666;
            --border: #e0e0e0;
            --shadow: rgba(0, 0, 0, 0.08);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            font-weight: 400;
        }

        /* ANIMACIÓN DE CARGA */
        .loader-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        .loader-container.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .loader-content {
            text-align: center;
        }

        .loader-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 1.5rem;
        }

        .loader-icon svg {
            width: 100%;
            height: 100%;
            fill: var(--primary);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
        }

        .loader-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 3.5rem;
            font-weight: 400;
            letter-spacing: 0.15em;
            color: var(--primary);
            margin-bottom: 0.5rem;
        }

        .loader-subtitle {
            font-family: 'Poppins', sans-serif;
            font-size: 0.85rem;
            color: var(--text-muted);
            letter-spacing: 0.2em;
            text-transform: uppercase;
            font-weight: 400;
        }

        .loader-line {
            width: 200px;
            height: 2px;
            background: var(--border);
            margin: 2rem auto 0;
            position: relative;
            overflow: hidden;
        }

        .loader-progress {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 0%;
            background: var(--primary);
            animation: loadProgress 3s ease-out forwards;
        }

        @keyframes loadProgress {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        /* CONTENIDO PRINCIPAL */
        .main-content {
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        .main-content.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* HEADER */
        header {
            background: var(--bg);
            border-bottom: 1px solid var(--border);
            padding: 1.25rem 1.5rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2rem;
            font-weight: 400;
            letter-spacing: 0.2em;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo-icon {
            width: 28px;
            height: 28px;
            fill: var(--primary);
        }

        /* CONTENEDOR */
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        .section-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .section-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 4rem;
            font-weight: 400;
            letter-spacing: 0.1em;
            margin-bottom: 0.5rem;
            line-height: 1;
            color: var(--primary);
        }

        .section-subtitle {
            font-family: 'Poppins', sans-serif;
            font-size: 0.9rem;
            color: var(--text-muted);
            font-weight: 400;
            letter-spacing: 0.05em;
        }

        /* CATEGORÍAS */
        .category-section {
            margin-bottom: 3rem;
        }

        .category-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
            padding-bottom: 0.75rem;
            border-bottom: 2px solid var(--primary);
        }

        .category-icon {
            width: 24px;
            height: 24px;
            fill: var(--primary);
        }

        .category-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.6rem;
            font-weight: 400;
            letter-spacing: 0.1em;
            color: var(--primary);
        }

        .category-count {
            margin-left: auto;
            font-family: 'Poppins', sans-serif;
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 400;
        }

        /* LISTA DE PRODUCTOS */
        .product-list {
            display: flex;
            flex-direction: column;
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px var(--shadow);
        }

        .product-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.25rem;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.25s ease;
            background: var(--bg);
        }

        .product-item:last-child {
            border-bottom: none;
        }

        .product-item:hover {
            background: var(--surface-hover);
            padding-left: 1.5rem;
        }

        .product-info {
            flex: 1;
            min-width: 0;
            padding-right: 1rem;
        }

        .product-name {
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            font-weight: 500;
            color: var(--text);
            margin-bottom: 0.2rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .product-description-preview {
            font-family: 'Poppins', sans-serif;
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 400;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .product-right {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-shrink: 0;
        }

        .product-price {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.4rem;
            font-weight: 400;
            color: var(--primary);
            letter-spacing: 0.02em;
        }

        .btn-view {
            padding: 0.5rem 1rem;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-muted);
            font-family: 'Poppins', sans-serif;
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: all 0.2s;
            border-radius: 4px;
            white-space: nowrap;
        }

        .btn-view:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: var(--surface);
        }

        /* MODAL */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            padding: 1rem;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background: var(--bg);
            border-radius: 12px;
            max-width: 500px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            transform: scale(0.95) translateY(10px);
            transition: all 0.3s ease;
            position: relative;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .modal-overlay.active .modal {
            transform: scale(1) translateY(0);
        }

        .modal-close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: rgba(255, 255, 255, 0.9);
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            color: var(--text);
            font-family: 'Poppins', sans-serif;
            font-size: 1.25rem;
            font-weight: 300;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            z-index: 10;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }

        .modal-close:hover {
            background: var(--primary);
            color: white;
            transform: rotate(90deg);
        }

        .modal-image-container {
            width: 100%;
            height: 250px;
            overflow: hidden;
            background: var(--surface);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .modal-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .modal-image-placeholder {
            width: 80px;
            height: 80px;
            fill: var(--border);
        }

        .modal-image-error {
            display: none;
        }

        .modal-body {
            padding: 1.5rem;
        }

        .modal-category {
            font-family: 'Poppins', sans-serif;
            font-size: 0.75rem;
            color: var(--text-muted);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .modal-category svg {
            width: 14px;
            height: 14px;
            fill: var(--text-muted);
        }

        .modal-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.2rem;
            font-weight: 400;
            letter-spacing: 0.03em;
            margin-bottom: 0.75rem;
            color: var(--text);
            line-height: 1.1;
        }

        .modal-price {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2rem;
            color: var(--primary);
            font-weight: 400;
            margin-bottom: 1.25rem;
            letter-spacing: 0.02em;
        }

        .modal-description {
            font-family: 'Poppins', sans-serif;
            color: var(--text-muted);
            line-height: 1.7;
            margin-bottom: 1.5rem;
            font-size: 0.95rem;
            font-weight: 400;
        }

        /* SISTEMA DE VALORACIÓN */
        .rating-section {
            background: var(--surface);
            border-radius: 8px;
            padding: 1.25rem;
            margin-bottom: 1.5rem;
        }

        .rating-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .rating-title {
            font-family: 'Poppins', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text);
        }

        .current-rating {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .current-rating-value {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.6rem;
            font-weight: 400;
            color: var(--primary);
        }

        .rating-stars-display {
            color: var(--secondary);
            font-size: 1rem;
            letter-spacing: 0.05em;
        }

        .user-rating-section {
            text-align: center;
        }

        .user-rating-title {
            font-family: 'Poppins', sans-serif;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 1rem;
            font-weight: 400;
        }

        .rating-stars {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            margin-bottom: 0.75rem;
        }

        .rating-star {
            font-size: 2.2rem;
            color: var(--border);
            cursor: pointer;
            transition: all 0.15s ease;
            user-select: none;
            line-height: 1;
        }

        .rating-star:hover {
            transform: scale(1.1);
            color: var(--secondary);
        }

        .rating-star.active {
            color: var(--secondary);
            animation: starPop 0.25s ease;
        }

        .rating-star.hovered {
            color: #e6c860;
        }

        @keyframes starPop {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        .rating-text {
            text-align: center;
            color: var(--text-muted);
            font-family: 'Poppins', sans-serif;
            font-size: 0.85rem;
            font-weight: 400;
            min-height: 1.25rem;
        }

        /* BOTÓN CERRAR MODAL */
        .modal-actions {
            display: flex;
            justify-content: center;
        }

        .btn-close-modal {
            padding: 0.875rem 2.5rem;
            background: var(--primary);
            border: none;
            color: white;
            font-family: 'Poppins', sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: all 0.2s;
            border-radius: 6px;
        }

        .btn-close-modal:hover {
            background: var(--primary-light);
            transform: translateY(-1px);
        }

        /* NOTIFICACIÓN */
        .notification {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            background: var(--primary);
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 8px;
            transform: translateX(400px);
            transition: transform 0.3s ease;
            z-index: 2000;
            font-family: 'Poppins', sans-serif;
            font-weight: 500;
            font-size: 0.9rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }

        .notification.show {
            transform: translateX(0);
        }

        /* RESPONSIVE - MÓVIL MEJORADO */
        @media (max-width: 640px) {
            .loader-title {
                font-size: 2.5rem;
            }

            .section-title {
                font-size: 2.8rem;
            }

            .container {
                padding: 1.5rem 0.75rem;
            }

            .category-header {
                margin-bottom: 1rem;
                padding-bottom: 0.5rem;
            }

            .category-title {
                font-size: 1.3rem;
            }

            .category-icon {
                width: 20px;
                height: 20px;
            }

            .product-item {
                padding: 0.875rem 1rem;
                flex-wrap: wrap;
                gap: 0.5rem;
            }

            .product-item:hover {
                padding-left: 1.125rem;
            }

            .product-info {
                width: 100%;
                padding-right: 0;
                margin-bottom: 0.5rem;
            }

            .product-name {
                font-size: 0.95rem;
                white-space: normal;
                line-height: 1.3;
            }

            .product-description-preview {
                display: none;
            }

            .product-right {
                width: 100%;
                justify-content: space-between;
            }

            .product-price {
                font-size: 1.2rem;
            }

            .btn-view {
                padding: 0.4rem 0.875rem;
                font-size: 0.7rem;
            }

            .modal-image-container {
                height: 200px;
            }

            .modal-body {
                padding: 1.25rem;
            }

            .modal-title {
                font-size: 1.8rem;
            }

            .modal-price {
                font-size: 1.6rem;
                margin-bottom: 1rem;
            }

            .modal-description {
                font-size: 0.9rem;
            }

            .rating-star {
                font-size: 1.8rem;
            }

            .btn-close-modal {
                width: 100%;
                padding: 1rem;
            }
        }

        @media (max-width: 380px) {
            .section-title {
                font-size: 2.2rem;
            }

            .product-name {
                font-size: 0.9rem;
            }

            .product-price {
                font-size: 1.1rem;
            }

            .btn-view {
                padding: 0.35rem 0.75rem;
                font-size: 0.65rem;
            }
        }

        /* SCROLLBAR */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--surface);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }
    </style>
</head>
<body>
    <!-- ANIMACIÓN DE CARGA -->
    <div class="loader-container" id="loader">
        <div class="loader-content">
            <div class="loader-icon">
                <svg viewBox="0 0 24 24">

            </div>
        </div>
    </div>

    <!-- CONTENIDO PRINCIPAL -->
    <div class="main-content" id="mainContent">
        <header>
            <div class="header-content">
                <div class="logo">
                    <svg class="logo-icon" viewBox="0 0 24 24">

                    <span>MENU</span>

        <div class="container">
            <div class="section-header">
                <h1 class="section-title">MENU</h1>
                <p class="section-subtitle">Selección de platos</p>
            </div>

            <div id="menuContainer">
                <!-- Categorías generadas dinámicamente -->
            </div>
        </div>
    </div>

    <!-- MODAL -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <button class="modal-close" onclick="closeModal()">×</button>
            <div class="modal-image-container" id="modalImageContainer">
                <img src="" alt="" class="modal-image" id="modalImage" onerror="handleImageError(this)">
                <svg class="modal-image-placeholder modal-image-error" id="modalPlaceholder" viewBox="0 0 24 24">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
                </svg>
            </div>
            <div class="modal-body">
                <div class="modal-category" id="modalCategory">
                    <svg viewBox="0 0 24 24"><path d="M12 2L2 7V9H22V7L12 2Z"/></svg>
                    <span id="modalCategoryText"></span>
                </div>
                <h2 class="modal-title" id="modalTitle"></h2>
                <div class="modal-price" id="modalPrice"></div>
                <p class="modal-description" id="modalDescription"></p>
                
                <div class="rating-section">
                    <div class="rating-header">
                        <span class="rating-title">Valoración</span>
                        <div class="current-rating">
                            <span class="current-rating-value" id="currentRating">0.0</span>
                            <span class="rating-stars-display" id="ratingStarsDisplay"></span>
                        </div>
                    </div>
                    
                    <div class="user-rating-section">
                        <div class="user-rating-title">¿Qué te pareció?</div>
                        <div class="rating-stars" id="ratingStars">
                            <span class="rating-star" data-value="1">★</span>
                            <span class="rating-star" data-value="2">★</span>
                            <span class="rating-star" data-value="3">★</span>
                            <span class="rating-star" data-value="4">★</span>
                            <span class="rating-star" data-value="5">★</span>
                        </div>
                        <div class="rating-text" id="ratingText">Selecciona una estrella</div>
                    </div>
                </div>

                <div class="modal-actions">
                    <button class="btn-close-modal" onclick="closeModal()">Cerrar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- NOTIFICACIÓN -->
    <div class="notification" id="notification">
        <span id="notificationText">Valoración guardada</span>
    </div>

    <script>
        // Iconos por categoría
        const categoryIcons = {

                { id: 510, name: "Helado Artesanal", price: 8.50, description: "Selección de 3 sabores de helado artesanal: vainilla de Madagascar, chocolate belga y pistacho de Bronte.", rating: 4.6, reviews: 234, userRating: 0, image: "https://images.unsplash.com/photo-1563805042-7684c019e1cb?w=600&h=400&fit=crop" },
                { id: 511, name: "Coulant de Chocolate", price: 13.50, description: "Bizcocho de chocolate con corazón fundido, acompañado de helado de turrón.", rating: 4.9, reviews: 445, userRating: 0, image: "https://images.unsplash.com/photo-1624353365286-3f8d62daad51?w=600&h=400&fit=crop" },
                { id: 512, name: "Sorbete de Mango", price: 9.00, description: "Sorbete de mango alphilso con frutas tropicales frescas y menta. Opción vegana.", rating: 4.5, reviews: 134, userRating: 0, image: "https://images.unsplash.com/photo-1563805042-7684c019e1cb?w=600&h=400&fit=crop" }
            ]
        };

        let currentProduct = null;
        let selectedRating = 0;

        // INICIALIZACIÓN
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loader').classList.add('hidden');
                document.getElementById('mainContent').classList.add('visible');
                renderMenu();
            }, 3000);
        });

        // RENDERIZAR MENÚ
        function renderMenu() {
            const container = document.getElementById('menuContainer');
            
            Object.keys(menuData).forEach(category => {
                const products = menuData[category];
                const section = document.createElement('div');
                section.className = 'category-section';
                
                section.innerHTML = `
                    <div class="category-header">
                        <svg class="category-icon" viewBox="0 0 24 24">
                            <path d="${categoryIcons[category] || categoryIcons['Carnes']}"/>
                        </svg>
                        <h2 class="category-title">${category}</h2>
                        <span class="category-count">${products.length} platos</span>
                    </div>
                    <div class="product-list">
                        ${products.map(product => `
                            <div class="product-item" onclick="openModal(${product.id}, '${category}')">
                                <div class="product-info">
                                    <div class="product-name">${product.name}</div>
                                    <div class="product-description-preview">${product.description.substring(0, 50)}...</div>
                                </div>
                                <div class="product-right">
                                    <div class="product-price">$${product.price.toFixed(2)}</div>
                                    <button class="btn-view" onclick="event.stopPropagation(); openModal(${product.id}, '${category}')">
                                        Ver Detalles
                                    </button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
                
                container.appendChild(section);
            });
        }

        // ENCONTRAR PRODUCTO
        function findProduct(id, category) {
            return menuData[category].find(p => p.id === id);
        }

        // MANEJAR ERROR DE IMAGEN
        function handleImageError(img) {
            img.style.display = 'none';
            document.getElementById('modalPlaceholder').style.display = 'block';
        }

        // ABRIR MODAL
        function openModal(productId, category) {
            currentProduct = findProduct(productId, category);
            if (!currentProduct) return;

            // Resetear imagen
            const img = document.getElementById('modalImage');
            const placeholder = document.getElementById('modalPlaceholder');
            img.style.display = 'block';
            placeholder.style.display = 'none';
            img.src = currentProduct.image;

            document.getElementById('modalCategoryText').textContent = category;
            document.querySelector('.modal-category svg path').setAttribute('d', categoryIcons[category] || categoryIcons['Carnes']);
            document.getElementById('modalTitle').textContent = currentProduct.name;
            document.getElementById('modalPrice').textContent = `$${currentProduct.price.toFixed(2)}`;
            document.getElementById('modalDescription').textContent = currentProduct.description;
            document.getElementById('currentRating').textContent = currentProduct.rating.toFixed(1);
            document.getElementById('ratingStarsDisplay').textContent = '★'.repeat(Math.floor(currentProduct.rating));
            
            selectedRating = currentProduct.userRating || 0;
            updateStarDisplay(selectedRating);
            updateRatingText(selectedRating);

            document.getElementById('modalOverlay').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        // CERRAR MODAL
        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('active');
            document.body.style.overflow = '';
            
            if (currentProduct && selectedRating > 0) {
                currentProduct.userRating = selectedRating;
            }
        }

        document.getElementById('modalOverlay').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) closeModal();
        });

        // SISTEMA DE VALORACIÓN
        const stars = document.querySelectorAll('.rating-star');
        const ratingTexts = [
            "Selecciona una estrella",
            "No me gustó",
            "Estuvo bien",
            "Buen sabor",
            "Muy rico",
            "¡Excelente!"
        ];

        stars.forEach(star => {
            star.addEventListener('mouseenter', () => {
                const value = parseInt(star.dataset.value);
                updateStarDisplay(value, true);
                updateRatingText(value);
            });

            star.addEventListener('click', () => {
                selectedRating = parseInt(star.dataset.value);
                updateStarDisplay(selectedRating);
                
                star.style.transform = 'scale(1.1)';
                setTimeout(() => {
                    star.style.transform = '';
                }, 200);

                showNotification(`Valoración guardada: ${selectedRating} estrellas`);
            });
        });

        document.getElementById('ratingStars').addEventListener('mouseleave', () => {
            updateStarDisplay(selectedRating);
            updateRatingText(selectedRating);
        });

        function updateStarDisplay(rating, isHover = false) {
            stars.forEach(star => {
                const value = parseInt(star.dataset.value);
                star.classList.remove('active', 'hovered');
                
                if (value <= rating) {
                    if (isHover) {
                        star.classList.add('hovered');
                    } else {
                        star.classList.add('active');
                    }
                }
            });
        }

        function updateRatingText(rating) {
            document.getElementById('ratingText').textContent = ratingTexts[rating] || ratingTexts[0];
        }

        // NOTIFICACIÓN
        function showNotification(text) {
            const notification = document.getElementById('notification');
            document.getElementById('notificationText').textContent = text;
            notification.classList.add('show');
            
            setTimeout(() => {
                notification.classList.remove('show');
            }, 2500);
        }

        // TECLA ESC
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });
    </script>
</body>
</html>
